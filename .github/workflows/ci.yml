name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: rota
          POSTGRES_PASSWORD: pa55word
          POSTGRES_DB: rota
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rota -d rota"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install goose
        working-directory: backend
        run: go install -tags="no_clickhouse no_libsql no_mssql no_mysql no_sqlite3 no_vertica no_ydb" github.com/pressly/goose/v3/cmd/goose@v3.27.0

      - name: Run backend vet
        working-directory: backend
        run: go vet ./...

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Apply migrations for integration tests
        working-directory: backend
        run: goose -dir ../migrations postgres "postgres://rota:pa55word@localhost:5432/rota?sslmode=disable" up

      - name: Run backend integration tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: rota
          POSTGRES_PASSWORD: pa55word
          POSTGRES_DB: rota
        run: go test -tags=integration ./...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm lint

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t rota-backend ./backend

      - name: Build frontend image
        run: docker build -t rota-frontend ./frontend

  migrations-roundtrip:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: rota
          POSTGRES_PASSWORD: pa55word
          POSTGRES_DB: rota
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rota -d rota"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install goose
        working-directory: backend
        run: go install -tags="no_clickhouse no_libsql no_mssql no_mysql no_sqlite3 no_vertica no_ydb" github.com/pressly/goose/v3/cmd/goose@v3.27.0

      - name: Run migration roundtrip
        shell: bash
        run: |
          set -euo pipefail
          db_url="postgres://rota:pa55word@localhost:5432/rota?sslmode=disable"
          goose -dir migrations postgres "$db_url" up
          goose -dir migrations postgres "$db_url" down
          goose -dir migrations postgres "$db_url" up

          latest_version="$(
            find migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' \
              | sort \
              | tail -n1 \
              | cut -d_ -f1 \
              | sed 's/^0*//'
          )"
          latest_version="${latest_version:-0}"
          current_version="$(
            goose -dir migrations postgres "$db_url" version 2>&1 \
              | grep -Eo 'version [0-9]+' \
              | awk '{print $2}' \
              | tail -n1
          )"

          if [[ "$current_version" != "$latest_version" ]]; then
            echo "expected goose version $latest_version, got $current_version"
            exit 1
          fi
