services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rota}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pa55word}
      POSTGRES_DB: ${POSTGRES_DB:-rota}
    ports:
      - "127.0.0.1::5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 1s
      timeout: 3s
      retries: 30
