services:
  postgres:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT:?required}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
